controller_manager:
  ros__parameters:
    update_rate: 100

    arm_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    arm_effort_controller:
      type: effort_controllers/JointGroupEffortController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


arm_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pitch_joint
      - shoulder_yaw_joint
      - shoulder_roll_joint
      - elbow_pitch_joint
      - wrist_roll_joint
      - wrist_pitch_joint
      - wrist_yaw_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

arm_effort_controller:
  ros__parameters:
    joints:
      - shoulder_pitch_joint
      - shoulder_yaw_joint
      - shoulder_roll_joint
      - elbow_pitch_joint
      - wrist_roll_joint
      - wrist_pitch_joint
      - wrist_yaw_joint
    interface_name: effort
